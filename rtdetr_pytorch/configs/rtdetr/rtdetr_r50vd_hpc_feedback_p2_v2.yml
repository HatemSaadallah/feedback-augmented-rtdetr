# P2 + 500q + multi-scale + multi-level feedback, v2.
#
# Three changes vs v1 (rtdetr_r50vd_hpc_feedback_p2.yml), targeting the
# negative ablation result (feedback ON ≈ feedback OFF on AP_S):
#   1. feedback_gate_init: -2.0 -> 0.0   (sigmoid(0)=0.5 instead of 0.12)
#   2. feedback_gate_floor: 0.1          (NEW; reparam: eff = floor + (1-floor)*sigmoid(α);
#                                         with init=0 + floor=0.1 -> eff=0.55 at start;
#                                         can never collapse below 0.1)
#   3. feedback_level_mask: [t,t,f,f]   (NEW; refine ONLY P2/P3 — where small
#                                         objects live — leave S4/S5 untouched)
#
# LRs reset to the un-decayed chain-1 baseline (5e-5), since this is a fresh
# training from the RT-DETR pretrained weights (no continuation from v1 ckpt).
# 12 logical epochs, chained 3x4 ep, decay at ep 9.

__include__: [
  "../dataset/coco_detection.yml",
  "../runtime.yml",
  "./include/dataloader.yml",
  "./include/optimizer.yml",
  "./include/rtdetr_r50vd.yml",
]

output_dir: /home/3415496/rt-detr/output/rtdetr_r50vd_hpc_feedback_p2_v2

PResNet:
  return_idx: [0, 1, 2, 3]

HybridEncoder:
  in_channels: [256, 512, 1024, 2048]
  feat_strides: [4, 8, 16, 32]
  use_encoder_idx: [3]
  hidden_dim: 256
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  enc_act: gelu
  pe_temperature: 10000
  expansion: 1.0
  depth_mult: 1
  act: silu
  eval_spatial_size: [640, 640]

RTDETRTransformer:
  feat_channels: [256, 256, 256, 256]
  feat_strides: [4, 8, 16, 32]
  num_levels: 4
  num_queries: 500
  hidden_dim: 256
  num_decoder_layers: 6
  num_denoising: 100
  eval_idx: -1
  eval_spatial_size: [640, 640]
  use_feedback: True
  feedback_layer_idx: 0
  feedback_gate_init: 0.0
  feedback_gate_floor: 0.1
  feedback_level_mask: [true, true, false, false]
  feedback_dim_feedforward: 1024
  feedback_dropout: 0.0

RTDETR:
  multi_scale: [480, 512, 544, 576, 608, 640, 640, 640, 672, 704, 736, 768, 800]

train_dataloader:
  batch_size: 4
  num_workers: 4
val_dataloader:
  batch_size: 4
  num_workers: 4

feedback_warmup_epochs: 1

epoches: 4

optimizer:
  type: AdamW
  params:
    - {params: "backbone", lr: 0.0000005}
    - {params: "decoder\\.feedback", lr: 0.00005}
    - {params: "^(?=.*encoder(?=.*bias|.*norm.*weight)).*$", weight_decay: 0.}
    - {params: "^(?!.*feedback)(?=.*decoder(?=.*bias|.*norm.*weight)).*$", weight_decay: 0.}
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [9]
  gamma: 0.1
