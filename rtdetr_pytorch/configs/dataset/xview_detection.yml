# xView tiled detection (generated by tools/xview_to_coco.py).
# Expects the following tree under data/xview_coco/:
#   images/train/*.png
#   images/val/*.png
#   annotations/xview_train.json
#   annotations/xview_val.json

task: detection

# xView has 60 object categories after dense remapping.
num_classes: 60
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: data/xview_coco/images/train
    ann_file:  data/xview_coco/annotations/xview_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  batch_size: 4
  num_workers: 4
  drop_last: True
  collate_fn: default_collate_fn


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: data/xview_coco/images/val
    ann_file:  data/xview_coco/annotations/xview_val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  batch_size: 8
  num_workers: 4
  drop_last: False
  collate_fn: default_collate_fn
