# Eval P2-feedback model at 800x800 input. Inherits FROM the P2 training config
# (architecture matches), only overrides eval input size.
__include__: [
  "./rtdetr_r50vd_hpc_feedback_p2.yml",
]

HybridEncoder:
  eval_spatial_size: [800, 800]

RTDETRTransformer:
  eval_spatial_size: [800, 800]

val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [800, 800]}
        - {type: ToImageTensor}
        - {type: ConvertDtype}
